<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Matrix Calculator in C</h1>

<div class="matrices">

<div class="matrix">
<h2>Matrix A</h2>

<input type="number" id="a11">
<input type="number" id="a12"><br>

<input type="number" id="a21">
<input type="number" id="a22">

</div>

<div class="matrix">

<h2>Matrix B</h2>

<input type="number" id="b11">
<input type="number" id="b12"><br>

<input type="number" id="b21">
<input type="number" id="b22">

</div>

</div>

<div class="buttons">

<button onclick="addMatrices()">Addition</button>

<button onclick="subtractMatrices()">Subtraction</button>

<button onclick="multiplyMatrices()">Multiplication</button>

<button onclick="transposeMatrix()">Transpose A</button>

<button onclick="determinant()">Determinant A</button>

</div>

<h2>Result</h2>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
